<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Admin | Go Dine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root {
    --bg: #0a0a0a;
    --card: #141414;
    --border: rgba(255,255,255,0.06);
    --lime: #b6ff2a;
    --white: #ffffff;
    --muted: #888888;
    --r: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; overflow-x: hidden; }

.navbar { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: rgba(10,10,10,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--lime); text-decoration: none; display: flex; align-items: center; gap: 8px; }
.logo span { color: var(--white); }

.container { max-width: 1400px; margin: 40px auto; padding: 0 40px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 32px; position: relative; overflow: hidden; transition: transform 0.2s; }
.stat-card:hover { transform: translateY(-4px); }
.stat-label { font-size: 0.85rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
.stat-value { font-size: 2.5rem; font-weight: 800; font-family: 'Space Grotesk', sans-serif; }
.stat-accent { color: var(--lime); }
.stat-icon { position: absolute; right: -20px; bottom: -20px; font-size: 8rem; opacity: 0.03; pointer-events: none; }

.table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.table-header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.table-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 16px 32px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); }
td { padding: 20px 32px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
tr:last-child td { border-bottom: none; }

.badge { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
.badge-pro { background: rgba(182,255,42,0.1); color: var(--lime); }
.badge-starter { background: rgba(255,255,255,0.05); color: var(--muted); }
.badge-lifetime { background: linear-gradient(135deg, #b6ff2a, #00ffcc); color: #000; }

#login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
.login-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: var(--r); width: 100%; max-width: 400px; text-align: center; }
input { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 16px; outline: none; }
button { width: 100%; padding: 14px; background: var(--lime); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.reveal { animation: fadeIn 0.6s ease-out forwards; }
</style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="margin-bottom: 24px; font-family: 'Space Grotesk';">Master Admin Access</h2>
        <input type="password" id="admin-pass" placeholder="Enter Master Password">
        <button onclick="checkPass()">Login</button>
    </div>
</div>

<nav class="navbar">
    <a href="#" class="logo">Go <span>Dine</span> Admin</a>
    <div style="display:flex; gap: 24px; align-items: center;">
        <span style="font-size: 0.8rem; color: var(--muted);">v2.4.0 Live Production</span>
        <button onclick="logout()" style="width: auto; padding: 8px 16px; background: transparent; color: var(--muted); border: 1px solid var(--border);">Logout</button>
    </div>
</nav>

<main class="container">
    <div class="stats-grid">
        <div class="stat-card reveal" style="animation-delay: 0.1s;">
            <span class="stat-label">Total Restaurants</span>
            <div class="stat-value" id="stat-count">0</div>
            <div class="stat-icon">🏪</div>
        </div>
        <div class="stat-card reveal" style="animation-delay: 0.2s;">
            <span class="stat-label">Platform Revenue</span>
            <div class="stat-value stat-accent" id="stat-rev">₹0</div>
            <div class="stat-icon">💰</div>
        </div>
        <div class="stat-card reveal" style="animation-delay: 0.3s;">
            <span class="stat-label">Active Pro Users</span>
            <div class="stat-value" id="stat-pro">0</div>
            <div class="stat-icon">✨</div>
        </div>
    </div>

    <div class="table-wrap reveal" style="animation-delay: 0.4s;">
        <div class="table-header">
            <h2 class="table-title">Restaurant Registry</h2>
            <div style="display:flex; gap: 12px;">
                <input type="text" id="search" placeholder="Search by name/email..." style="margin-bottom:0; width: 250px; font-size: 0.85rem;" oninput="filterTable()">
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Restaurant</th>
                    <th>Email</th>
                    <th>Plan</th>
                    <th>Status</th>
                    <th>Expiry</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="rest-body">
                <!-- Rows injected here -->
            </tbody>
        </table>
    </div>
</main>

<script>
let sb;
let restaurants = [];

async function checkPass() {
    const pass = document.getElementById('admin-pass').value;
    if (pass === 'godine_master_2026') {
        document.getElementById('login-overlay').style.display = 'none';
        init();
    } else {
        alert('Incorrect Password');
    }
}

function logout() { location.reload(); }

async function init() {
    sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
    await fetchData();
}

async function fetchData() {
    const { data: rests } = await sb.from('restaurants').select('*').order('created_at', { ascending: false });
    const { data: pays } = await sb.from('payments').select('amount').eq('status', 'successful');
    
    restaurants = rests || [];
    const totalRevenue = (pays || []).reduce((acc, curr) => acc + parseFloat(curr.amount), 0);
    const proCount = restaurants.filter(r => r.plan === 'pro' || r.plan === 'advanced' || r.plan === 'lifetime').length;

    document.getElementById('stat-count').textContent = restaurants.length;
    document.getElementById('stat-rev').textContent = '₹' + totalRevenue.toLocaleString();
    document.getElementById('stat-pro').textContent = proCount;

    renderTable(restaurants);
}

function renderTable(list) {
    const body = document.getElementById('rest-body');
    body.innerHTML = list.map(r => `
        <tr>
            <td>
                <div style="font-weight:700;">${r.name}</div>
                <div style="font-size:0.75rem; color:var(--muted);">/${r.slug}</div>
            </td>
            <td style="color:var(--muted);">${r.owner_email || 'N/A'}</td>
            <td><span class="badge badge-${r.plan}">${r.plan}</span></td>
            <td>
                <span style="color: ${r.is_active ? '#4ade80' : '#ff4444'}; font-weight: 700;">
                    ● ${r.is_active ? 'Active' : 'Inactive'}
                </span>
            </td>
            <td style="font-size:0.8rem; color:var(--muted);">
                ${r.subscription_end ? new Date(r.subscription_end).toLocaleDateString() : 'Trial'}
            </td>
            <td>
                <button onclick="toggleStatus('${r.id}', ${r.is_active})" style="padding: 6px 12px; width: auto; font-size: 0.75rem; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border);">
                    ${r.is_active ? 'Suspend' : 'Activate'}
                </button>
            </td>
        </tr>
    `).join('');
}

async function toggleStatus(id, current) {
    const { error } = await sb.from('restaurants').update({ is_active: !current }).eq('id', id);
    if (!error) fetchData();
}

function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = restaurants.filter(r => 
        r.name.toLowerCase().includes(q) || 
        (r.owner_email && r.owner_email.toLowerCase().includes(q)) ||
        r.slug.toLowerCase().includes(q)
    );
    renderTable(filtered);
}
</script>

</body>
</html>
