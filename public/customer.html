<style>
/* Base Styles */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background-color:#121212;color:#ffffff;min-height:100vh;display:flex;flex-direction:column;padding-bottom:100px;overflow-x:hidden;}
.header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(18,18,18,0.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.08);}
.h-left{display:flex;flex-direction:column;}
.rest-name{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-0.5px;color:#fff;}
.rest-meta{font-size:0.8rem;color:#888;margin-top:2px;font-weight:500;}
.content{padding:20px;flex:1;}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:16px;color:#fff;}

/* Order Card */
.order-card{background:#1e1e1e;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.05);box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.order-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.order-id{font-family:'Space Grotesk',monospace;font-size:0.9rem;color:#888;}
.order-status{padding:6px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.status-pending{background:rgba(245,166,35,0.15);color:#f5a623;}
.status-preparing{background:rgba(52,152,219,0.15);color:#3498db;}
.status-ready{background:rgba(46,204,113,0.15);color:#2ecc71;}
.status-completed{background:rgba(155,89,182,0.15);color:#9b59b6;}
.status-cancelled{background:rgba(255,68,68,0.15);color:#ff4444;}

.eta-box{margin-top:12px;padding:12px;border-radius:12px;background:rgba(52,152,219,0.08);border:1px solid rgba(52,152,219,0.2);display:flex;align-items:center;gap:12px;display:none;}
.eta-box.show{display:flex;}
.eta-icon{font-size:1.5rem;}
.eta-text{font-size:0.9rem;color:#fff;}
.eta-highlight{font-weight:700;color:#3498db;}

.order-items{margin-top:16px;border-top:1px solid rgba(255,255,255,0.05);padding-top:16px;}
.ci-item{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:8px;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.04);}
.ci-visual{width:48px;height:48px;flex-shrink:0;border-radius:8px;overflow:hidden;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.05);}
.ci-img{width:100%;height:100%;object-fit:cover;}
.ci-emoji{font-size:1.5rem;}
.ci-info{flex:1;min-width:0;}
.ci-name-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.ci-name{font-weight:600;font-size:0.95rem;color:#fff;}
.ci-qty{font-size:0.8rem;color:#888;}
.order-total{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;}

.empty-state{text-align:center;padding:40px 20px;color:#888;}
.empty-icon{font-size:3rem;margin-bottom:16px;}
.back-btn{display:inline-block;margin-top:20px;padding:12px 24px;border-radius:24px;background:#c1ff00;color:#000;text-decoration:none;font-weight:700;font-family:'Space Grotesk';}

/* Auth Guard */
#auth-guard{position:fixed;inset:0;background:#121212;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
.spinner{width:40px;height:40px;border:4px solid rgba(193,255,0,0.2);border-top-color:#c1ff00;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Feedback & Cancel Buttons */
.feedback-btn{display:inline-block;margin-top:12px;padding:10px 20px;border-radius:24px;background:linear-gradient(135deg,#c1ff00,#a0e000);color:#000;text-decoration:none;font-weight:700;font-family:'Space Grotesk';font-size:0.85rem;transition:box-shadow 0.2s,transform 0.15s;text-align:center}
.feedback-btn:hover{box-shadow:0 0 20px rgba(193,255,0,0.4);transform:translateY(-1px)}
.feedback-done{display:inline-block;margin-top:12px;padding:8px 16px;border-radius:20px;background:rgba(74,222,128,0.12);color:#4ade80;font-size:0.8rem;font-weight:600}
.cancel-btn{display:inline-block;margin-top:12px;padding:8px 16px;border:none;border-radius:20px;background:rgba(255,68,68,0.15);color:#ff4444;font-size:0.8rem;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;transition:background 0.2s}
.cancel-btn:hover{background:rgba(255,68,68,0.25)}

/* Announcement Banner */
.announcement-banner {
  background: linear-gradient(135deg, #c1ff00, #a0e000);
  color: #000;
  padding: 14px 20px;
  border-radius: 16px;
  margin-bottom: 24px;
  font-size: 0.95rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 4px 15px rgba(193, 255, 0, 0.2);
  border: 1px solid rgba(255,255,255,0.1);
}
  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: #1e1e1e; color: #fff; padding: 12px 24px; border-radius: 12px;
    font-size: 0.9rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 1000;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    opacity: 0; pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Bill Summary Refined */
  #bill-summary {
    background: linear-gradient(145deg, #1a1a1a, #121212);
    border: 1px solid rgba(193,255,0,0.15);
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    padding: 28px;
    border-radius: 24px;
    margin-top: 32px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .bill-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    color: #c1ff00;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .feedback-solicitation {
    background: rgba(193,255,0,0.05);
    padding: 20px;
    border-radius: 18px;
    margin: 24px 0;
    border: 1px dashed rgba(193,255,0,0.2);
    text-align: center;
  }
  .feedback-solicitation p {
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .bill-feedback-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #c1ff00;
    color: #000;
    padding: 12px 24px;
    border-radius: 14px;
    font-weight: 800;
    font-size: 0.9rem;
    text-decoration: none;
    transition: all 0.2s;
  }
  .bill-feedback-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(193,255,0,0.3); }
</style>
</head>
<body id="top" style="position: relative;">
<h1 style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">My Orders — GoDine</h1>
<div id="toast"></div>

<div id="auth-guard">
  <div class="spinner"></div>
  <div style="font-weight:500;">Loading your orders...</div>
</div>

<header class="header" id="header" style="display:none;">
  <div class="h-left">
    <div class="rest-name" id="rest-name">GoDine</div>
    <div class="rest-meta">Live Order Tracking</div>
  </div>
  <a href="#" class="back-link" style="color:#c1ff00;text-decoration:none;font-weight:600;font-size:0.9rem;">← Menu</a>
</header>

<main class="content" id="content" style="display:none;">
  <!-- ANNOUNCEMENT BANNER -->
  <div id="announcement-banner" class="announcement-banner" style="display:none; overflow:hidden;">
    <div style="flex-shrink:0; position:relative; z-index:2; background:inherit; padding-right:8px;">📢</div>
    <div style="flex:1; overflow:hidden; position:relative;">
      <div id="announcement-text" style="white-space:nowrap; display:inline-block; padding-left:100%; animation: announcement-scroll 15s linear infinite;"></div>
    </div>
  </div>

  <style>
    @keyframes announcement-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
  </style>

  <h2 class="section-title">Active Orders</h2>
  <div id="orders-container"></div>

  <!-- BILL SUMMARY SECTION -->
  <div id="bill-summary" style="display:none;">
      <div class="bill-title">🧾 Final Bill Summary</div>
      <div id="bill-items" style="margin-bottom:20px; border-bottom:1px solid #222; padding-bottom:16px;"></div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="color:#aaa; font-size:1rem; font-weight:600;">Grand Total</span>
        <span id="grand-total" style="color:#c1ff00; font-size:1.6rem; font-weight:800; font-family:'Space Grotesk';">₹0</span>
      </div>
      
      <div class="feedback-solicitation" id="feedback-solicitation">
        <p>How was your meal? We'd love to hear your thoughts! 🙏</p>
        <a href="#" id="bill-feedback-btn" class="bill-feedback-btn">⭐ Rate & Review</a>

      <div class="pay-options" style="margin-top:24px; display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <button onclick="payViaUPI()" class="pay-btn upi-btn" style="background:#fff; color:#000; border:none; padding:14px; border-radius:12px; font-weight:700; cursor:pointer;">Pay via UPI</button>
        <button onclick="payViaRazorpay()" class="pay-btn card-btn" style="background:#c1ff00; color:#000; border:none; padding:14px; border-radius:12px; font-weight:700; cursor:pointer;">Card/Netbanking</button>
      </div>
    </div>
</main>

<script>
const { createClient } = supabase;
let sb;

// Initialization with basic error handling
const isDemo = CONFIG.supabaseUrl === 'YOUR_SUPABASE_PROJECT_URL' || !CONFIG.supabaseUrl;
if (!isDemo) {
  try {
    sb = createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
  } catch (err) {
    console.error('Supabase Init Error:', err);
  }
}

const params = new URLSearchParams(location.search);
const restaurantSlug = params.get('r');
const tableNum = params.get('table') || localStorage.getItem('godine_table') || '1';

if (!restaurantSlug) {
  window.location.href = '/';
}

let restaurant = null;
let currentUser = null;
let orders = [];
let feedbackGiven = [];
try { feedbackGiven = JSON.parse(localStorage.getItem('godine_feedback') || '[]'); } catch(e){}

async function boot() {
  const savedGuest = localStorage.getItem('godine_guest');
  if (!savedGuest) {
    window.location.href = `menu?r=${restaurantSlug}`;
    return;
  }
  
  try {
    currentUser = JSON.parse(savedGuest);
  } catch(e) {
    window.location.href = `menu?r=${restaurantSlug}`;
    return;
  }

  document.getElementById('auth-guard').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('content').style.display = 'block';
  
  document.querySelector('.back-link').href = `menu?r=${restaurantSlug}&table=${tableNum}`;
  document.getElementById('rest-name').textContent = `Hello, ${currentUser.name.split(' ')[0]}!`;

  await fetchRestaurant();
  await fetchOrders();
  setupRealtime();
  setupRestaurantListener();
  
  // Initialize GoDineCustomer for the latest active order
  const latestActiveOrder = orders.find(o => o.status !== 'completed' && o.status !== 'cancelled');
  if (latestActiveOrder && typeof GoDineCustomer !== 'undefined') {
    GoDineCustomer.init(sb, latestActiveOrder.id);
  }

  // Update timers on buttons every second without full re-render
  setInterval(updateTimers, 1000);
}

function updateTimers() {
  const now = new Date().getTime();
  document.querySelectorAll('.cancel-btn').forEach(btn => {
    const orderTime = parseInt(btn.dataset.time);
    const diffSecs = (now - orderTime) / 1000;
    const remaining = Math.max(0, 10 - Math.floor(diffSecs));
    
    if (remaining <= 0) {
      btn.remove();
    } else {
      btn.textContent = `Cancel (${remaining}s)`;
    }
  });
}

async function fetchRestaurant() {
  const { data } = await sb.from('restaurants').select('*').eq('slug', restaurantSlug).single();
  if (data) {
    restaurant = data;
    renderAnnouncement();
  }
}

function renderAnnouncement() {
  const banner = document.getElementById('announcement-banner');
  const text = document.getElementById('announcement-text');
  if (restaurant && restaurant.announcement && restaurant.announcement.trim()) {
    text.textContent = restaurant.announcement;
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }
}

function setupRestaurantListener() {
  if (!restaurant || !sb) return;
  sb.channel('customer-restaurant-updates')
    .on('postgres_changes', { 
      event: 'UPDATE', 
      schema: 'public', 
      table: 'restaurants', 
      filter: `id=eq.${restaurant.id}` 
    }, payload => {
      console.log('Announcement Update Received:', payload);
      restaurant.announcement = payload.new.announcement;
      renderAnnouncement();
    }).subscribe(status => {
      console.log('Customer Restaurant Realtime Status:', status);
    });
}

async function fetchOrders() {
  const today = new Date(); today.setHours(0,0,0,0);
  const { data } = await sb.from('orders')
    .select('*')
    .eq('customer_phone', currentUser.phone)
    .gte('created_at', today.toISOString())
    .order('created_at', { ascending: false });
  
  orders = data || [];
  
  const unbilled = orders.filter(o => !o.bill_sent && o.status !== 'cancelled');
  const billed = orders.filter(o => o.bill_sent);
  
  renderOrders(orders);
}

function renderOrders(list) {
  const container = document.getElementById('orders-container');
  
  const active = list.filter(o => o.status !== 'completed' && o.status !== 'cancelled');
  const past = list.filter(o => o.status === 'completed');
  const cancelled = list.filter(o => o.status === 'cancelled');
  
  if (!list.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🍽️</div>
        <h3>No orders found</h3>
        <p>Looks like you haven't ordered anything yet.</p>
        <a href="menu?r=${restaurantSlug}&table=${tableNum}" class="back-btn">Go to Menu</a>
      </div>
    `;
    return;
  }

  let html = '';
  
  if (active.length) {
    html += active.map(o => createOrderCard(o)).join('');
  } else {
    html += `<div style="color:#aaa;margin-bottom:20px;">No current orders.</div>`;
  }

  if (past.length) {
    html += `<h2 class="section-title" style="margin-top:40px;font-size:1.2rem;">Past Orders</h2>`;
    html += past.map(o => createOrderCard(o)).join('');
  }

  if (cancelled.length) {
    html += `<h2 class="section-title" style="margin-top:40px;font-size:1.2rem;color:#ff4444;">Cancelled Orders</h2>`;
    html += cancelled.map(o => createOrderCard(o)).join('');
  }

  container.innerHTML = html;
  updateBillSummary(list);
}

function updateBillSummary(list) {
  // Show bill only if 'bill_sent' is true OR at least one order is 'completed'
  const billableOrders = list.filter(o => (o.bill_sent === true || o.status === 'completed') && o.status !== 'cancelled' && o.payment_status !== 'paid');
  const summaryEl = document.getElementById('bill-summary');
  const itemsEl = document.getElementById('bill-items');
  const totalEl = document.getElementById('grand-total');

  if (!billableOrders.length) {
    summaryEl.style.display = 'none';
    return;
  }

  summaryEl.style.display = 'block';
  let total = 0;
  let itemsHtml = '';
  
  billableOrders.forEach(o => {
    total += parseFloat(o.total);
    itemsHtml += `
      <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.95rem;">
        <span style="color:#eee; font-weight:600;">Order #${o.id.split('-').pop().toUpperCase().substring(0,4)}</span>
        <span style="color:#c1ff00; font-weight:700; font-family:'Space Grotesk';">₹${o.total}</span>
      </div>
    `;
  });

  itemsEl.innerHTML = itemsHtml;
  totalEl.textContent = `₹${total}`;
  window.currentBillTotal = total;
  
  // Link the feedback button to the latest billable order
  const latestOrder = billableOrders[0];
  const fbBtn = document.getElementById('bill-feedback-btn');
  if (fbBtn && latestOrder) {
    fbBtn.href = `feedback?r=${restaurantSlug}&order=${latestOrder.id}`;
    if (feedbackGiven.includes(latestOrder.id)) {
      document.getElementById('feedback-solicitation').style.display = 'none';
    } else {
      document.getElementById('feedback-solicitation').style.display = 'block';
    }
  }
}

async function payViaUPI() {
  if (!restaurant || !restaurant.upi_id) {
    showToast('⚠️ Restaurant UPI ID not set. Please use other methods.');
    return;
  }
  const total = window.currentBillTotal;
  const upiUrl = `upi://pay?pa=${restaurant.upi_id}&pn=${encodeURIComponent(restaurant.name)}&am=${total}&cu=INR&tn=Bill%20for%20Table%20${tableNum}`;
  
  // Create a record in payments as pending
  const { data: pData, error: pErr } = await sb.from('payments').insert({
    restaurant_id: restaurant.id,
    amount: total,
    method: 'upi_direct',
    status: 'pending'
  }).select().single();

  window.location.href = upiUrl;
  
  // After a delay, check if they want to mark as paid (manual for direct UPI)
  setTimeout(() => {
    if (confirm("Did you complete the payment? Click OK to notify the restaurant.")) {
      showToast('✅ Restaurant notified of your payment.');
    }
  }, 5000);
}

async function payViaRazorpay() {
  const total = window.currentBillTotal;
  showToast('Initializing secure payment...');
  
  try {
    const orderRes = await fetch(`${CONFIG.supabaseUrl}/functions/v1/create-razorpay-order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: total * 100, receipt: `bill_${Date.now()}` })
    });
    const orderData = await orderRes.json();
    if (!orderRes.ok) throw new Error(orderData.error);

    const options = {
      key: CONFIG.razorpayKeyId,
      amount: orderData.amount,
      currency: orderData.currency,
      name: restaurant.name,
      description: `Bill Payment - Table ${tableNum}`,
      order_id: orderData.id,
      handler: async function (response) {
        showToast('Verifying payment...');
        const verifyRes = await fetch(`${CONFIG.supabaseUrl}/functions/v1/verify-bill-payment`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ...response,
            restaurant_id: restaurant.id,
            customer_phone: currentUser.phone,
            amount: total
          })
        });
        if (verifyRes.ok) {
          showToast('✅ Payment successful!');
          fetchOrders();
        } else {
          showToast('❌ Verification failed.');
        }
      },
      prefill: {
        name: currentUser.name,
        contact: currentUser.phone
      },
      theme: { color: "#c1ff00" }
    };
    const rzp = new Razorpay(options);
    rzp.open();
  } catch (err) {
    showToast('⚠️ Payment failed: ' + err.message);
  }
}

function safeEmoji(e) {
  if (!e || e === 'null' || e === 'NULL') return '🍽️';
  return e;
}

function createOrderCard(o) {
  const idShort = ('#' + o.id.split('-').pop()).substring(0, 8).toUpperCase();
  const date = new Date(o.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  let statusText = 'Pending';
  switch (o.status) {
    case 'preparing': statusText = 'Preparing'; break;
    case 'ready': statusText = 'Ready for Pickup'; break;
    case 'completed': statusText = 'Completed'; break;
    case 'cancelled': statusText = 'Cancelled'; break;
  }

  const hasEta = o.status === 'pending' || o.status === 'preparing';
  const etaValue = o.estimated_time || '~15 minutes';
  const hasFeedback = feedbackGiven.includes(o.id);
  const showFeedbackBtn = o.status === 'completed' && !hasFeedback;
  
  const now = new Date().getTime();
  const orderTime = new Date(o.created_at).getTime();
  const diffSecs = (now - orderTime) / 1000;
  const showCancelBtn = o.status === 'pending' && diffSecs <= 10;
  const remaining = Math.max(0, 10 - Math.floor(diffSecs));
  const timerText = `${remaining}s`;

  return `
    <div class="order-card">
      <div class="order-head">
        <div>
          <div class="order-id">${idShort}</div>
          <div style="font-size:0.8rem;color:#666;margin-top:2px;">${date}</div>
        </div>
        <div class="order-status status-${o.status}">${statusText}</div>
      </div>
      
      ${o.token_number ? `
      <div style="margin-top:8px;margin-bottom:12px;padding:12px;border-radius:12px;background:rgba(193,255,0,0.08);border:1px solid rgba(193,255,0,0.15);display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:0.85rem;font-weight:700;color:#c1ff00;letter-spacing:1px;text-transform:uppercase;">Token Number</span>
        <span style="font-size:1.4rem;font-weight:800;color:#c1ff00;font-family:'Space Grotesk',sans-serif;">#${o.token_number}</span>
      </div>` : ''}

      <div class="eta-box ${hasEta ? 'show' : ''}">
        <div class="eta-icon">⏱️</div>
        <div class="eta-text">Estimated wait: <span class="eta-highlight">${etaValue}</span></div>
      </div>

      <div class="order-items">
        ${o.items.map(i => `
          <div class="ci-item">
            <div class="ci-visual">
              ${i.image_url 
                ? `<img src="${i.image_url}" class="ci-img" alt="${i.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                   <div class="ci-emoji" style="display:none">${safeEmoji(i.emoji)}</div>` 
                : `<div class="ci-emoji">${safeEmoji(i.emoji)}</div>`}
            </div>
            <div class="ci-info">
              <div class="ci-name-row">
                <span class="ci-name">${i.name}</span>
                <span class="ci-qty">${i.qty}×</span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      
      <div class="order-total">
        <span>Total</span>
        <span>₹${o.total}</span>
      </div>
        <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">
          ${showFeedbackBtn ? `<a href="feedback?r=${restaurantSlug}&order=${o.id}" class="feedback-btn">⭐ Rate Your Experience</a>` : '<div></div>'}
          ${(o.status === 'completed' && hasFeedback) ? `<div class="feedback-done">✅ Feedback submitted</div>` : ''}
          ${showCancelBtn ? `<button class="cancel-btn" data-time="${orderTime}" onclick="cancelCustomerOrder('${o.id}')">Cancel (${timerText})</button>` : ''}
        </div>
      </div>
    </div>
  `;
}

async function cancelCustomerOrder(id) {
  // Confirmation dialog removed per user request for faster cancellation within the 10s window
  try {
    const { error } = await sb.from('orders').update({ status: 'cancelled' }).eq('id', id);
    if (!error) {
      showToast('✅ Order cancelled successfully');
      fetchOrders();
    } else {
      showToast('⚠️ Could not cancel order');
    }
  } catch(e) {
    showToast('⚠️ Cancellation error');
  }
}

function setupRealtime() {
  sb.channel('customer-orders')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders', filter: `customer_phone=eq.${currentUser.phone}` }, payload => {
      fetchOrders();
    }).subscribe();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

boot();

// Register Service Worker for background status updates
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(reg => console.log('[GoDine SW] Registered'))
    .catch(err => console.error('[GoDine SW] Failed:', err));
}
</script>
</body>
</html>
