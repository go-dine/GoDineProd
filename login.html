<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Go Dine</title>
    <link rel="icon" type="image/png" href="assets/favicon.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --bg: #050505;
            --lime: #b6ff2a;
            --border: rgba(255,255,255,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Manrope', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #0d0d0d;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            box-shadow: 0 32px 64px -16px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.6s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .logo b { color: var(--lime); }
        .login-sub { color: #666; font-size: 13px; font-weight: 500; }
        .login-group { margin-bottom: 24px; }
        .login-group label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 8px; margin-left: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .login-group input {
            width: 100%;
            background: #121212;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }
        .login-group input:focus {
            border-color: rgba(182,255,42,0.3);
            box-shadow: 0 0 0 4px rgba(182,255,42,0.05);
            background: #151515;
        }
        .login-btn {
            background: var(--lime);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            transition: all 0.2s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(182,255,42,0.25);
            filter: brightness(1.1);
        }
        .login-footer { text-align: center; margin-top: 32px; color: #444; font-size: 13px; font-weight: 500; }
        .login-footer a { color: var(--lime); font-weight: 600; margin-left: 4px; text-decoration: none; }
        .login-footer a:hover { text-decoration: underline; }
        
        .error-toast {
            position: fixed;
            top: 24px;
            background: #ff4b4b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="error-toast" class="error-toast"></div>

    <div class="login-card">
        <div class="login-header">
            <div class="logo">Go <b>Dine</b></div>
            <p class="login-sub">Owner Dashboard · Sign In</p>
        </div>
        
        <div class="login-group">
            <label>Username</label>
            <input type="text" id="login-ident" placeholder="e.g. rustic-fork" autocomplete="username">
        </div>
        
        <div class="login-group">
            <label>Password</label>
            <input type="password" id="login-pass" placeholder="Enter owner password" autocomplete="current-password">
        </div>
        
        <button class="login-btn" id="login-btn" onclick="completeLogin()">
            Sign In &rarr;
        </button>
        
        <p class="login-footer">
            Interested in joining? <a href="index.html">Contact us</a>
        </p>
    </div>

    <script>
        const sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        async function completeLogin() {
            const ident = document.getElementById('login-ident').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('login-btn');

            if (!ident || !pass) { showError("Please enter credentials."); return; }

            btn.disabled = true;
            btn.innerHTML = 'Signing in...';

            try {
                const { data: rest, error } = await sb
                    .from('restaurants')
                    .select('*')
                    .or(`slug.eq.${ident},owner_email.eq.${ident}`)
                    .single();

                if (error || !rest) { 
                    showError("Restaurant not found."); 
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In &rarr;';
                    return; 
                }

                if (String(rest.owner_password) !== String(pass)) { 
                    showError("Incorrect password."); 
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In &rarr;';
                    return; 
                }

                if (rest.is_active === false) { 
                    showError("Your account has been suspended."); 
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In &rarr;';
                    return; 
                }

                localStorage.setItem('gd_auth', JSON.stringify({ id: rest.id, slug: rest.slug, name: rest.name }));
                window.location.href = "dashboard.html";
            } catch(e) { 
                showError("Login failed: " + e.message); 
                btn.disabled = false;
                btn.innerHTML = 'Sign In &rarr;';
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') completeLogin();
        });
    </script>
</body>
</html>
