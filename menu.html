<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Go Dine — Menu</title>
<link rel="icon" type="image/png" href="assets/favicon.png"/>
<link rel="apple-touch-icon" href="assets/icon.png"/>
<meta name="description" content="Browse the menu and place your order. Powered by Go Dine — the smart dining platform."/>
<link rel="canonical" href="https://godine.in/menu.html"/>

<!-- Open Graph Tags -->
<meta property="og:title" content="Restaurant Menu — Go Dine" />
<meta property="og:description" content="Browse the menu and place your order instantly from your phone." />
<meta property="og:image" content="https://godine.in/assets/og-image.jpg" />
<meta property="og:url" content="https://godine.in/menu.html" />
<meta property="og:type" content="website" />

<!-- Twitter Card Tags -->
<meta name="twitter:card" content="summary"/>
<meta name="twitter:title" content="Restaurant Menu — Go Dine"/>
<meta name="twitter:description" content="Browse the menu and place your order instantly from your phone."/>
<meta name="twitter:image" content="https://godine.in/assets/og-image.jpg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050505;--s1:#0e0e0e;--s2:#151515;--s3:#1c1c1c;
  --lime:#b6ff2a;--lime2:rgba(182,255,42,0.1);--lime3:rgba(182,255,42,0.18);
  --white:#f0f0ec;--muted:#6b6b67;--border:rgba(255,255,255,0.07);
  --r:12px;--r2:18px;
}
body{background:var(--bg);color:var(--white);font-family:'Manrope',sans-serif;min-height:100vh;padding-bottom:140px;-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:50;
  background:rgba(5,5,5,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 16px;
}
.header-top{display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px}
.logo b{color:var(--lime)}
.table-badge{
  background:var(--lime2);border:1px solid var(--lime3);
  border-radius:8px;padding:5px 12px;
  font-size:11px;font-weight:700;color:var(--lime);letter-spacing:0.5px;
}
.rest-info{padding:10px 0 14px}
.rest-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:2px}
.rest-meta{font-size:12px;color:var(--muted)}
.search-wrap{padding:10px 0 14px;position:relative}
.search-input{
  width:100%;background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px 10px 36px;
  font-size:14px;color:var(--white);font-family:'Manrope',sans-serif;
  outline:none;transition:border-color 0.2s;
}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:rgba(182,255,42,0.3)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted)}

/* ── CATEGORY PILLS ── */
.cats{
  display:flex;gap:8px;overflow-x:auto;
  padding:0 16px 14px;border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.cats::-webkit-scrollbar{display:none}
.cat-btn{
  flex-shrink:0;padding:7px 16px;border-radius:100px;
  font-size:12px;font-weight:600;letter-spacing:0.2px;
  border:1px solid var(--border);background:var(--s1);
  color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;
  font-family:'Manrope',sans-serif;
}
.cat-btn.active{background:var(--lime);color:#050505;border-color:var(--lime)}
.cat-btn:hover:not(.active){color:var(--white);border-color:rgba(255,255,255,0.15)}

/* ── MENU CONTENT ── */
.content{padding:20px 16px 0}
.section-head{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;margin:24px 0 14px}
.section-head:first-child{margin-top:0}

/* ── DISH CARD ── */
.dish-card{
  display:flex;align-items:flex-start;gap:14px;
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r2);padding:16px;margin-bottom:10px;
  transition:border-color 0.2s;
}
.dish-card.unavailable{opacity:0.4;pointer-events:none}
.dish-card:hover{border-color:rgba(255,255,255,0.12)}
.dish-emoji{
  width:64px;height:64px;flex-shrink:0;
  border-radius:12px;background:var(--s3);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
}
.dish-body{flex:1;min-width:0}
.dish-name{font-size:15px;font-weight:600;font-family:'Space Grotesk',sans-serif;margin-bottom:4px}
.dish-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.dish-bottom{display:flex;align-items:center;justify-content:space-between}
.dish-price{font-size:16px;font-weight:700;color:var(--lime)}
.qty-ctrl{display:flex;align-items:center;gap:0;border:1px solid var(--lime3);border-radius:8px;overflow:hidden}
.qty-btn{
  width:32px;height:32px;background:transparent;color:var(--lime);
  border:none;cursor:pointer;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;font-family:'Manrope',sans-serif;
}
.qty-btn:hover{background:var(--lime2)}
.qty-num{width:28px;text-align:center;font-size:13px;font-weight:700;color:var(--white)}
.add-btn{
  padding:8px 16px;background:transparent;
  border:1px solid var(--lime3);border-radius:8px;
  color:var(--lime);font-size:12px;font-weight:700;
  cursor:pointer;transition:all 0.2s;font-family:'Manrope',sans-serif;
}
.add-btn:hover{background:var(--lime2)}
.add-btn:active{background:var(--lime);color:#050505}
.unavail-tag{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:3px 8px}

/* ── LOADING ── */
.loading{text-align:center;padding:80px 0;color:var(--muted)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--lime);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 0;color:var(--muted)}
.empty .e-icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px}

/* ── ERROR STATE ── */
.error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:60vh;padding:40px}
.error-screen .e-icon{font-size:48px;margin-bottom:16px}
.error-screen h2{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px}
.error-screen p{font-size:14px;color:var(--muted);max-width:320px;line-height:1.6}
.error-screen a{margin-top:20px;display:inline-block;background:var(--lime);color:#050505;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:700}

/* ── CART BAR ── */
#cart-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--s1);border-top:1px solid var(--border);
  padding:12px 16px 20px;
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);
}
#cart-bar.visible{transform:translateY(0)}
.cart-inner{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:var(--lime);border-radius:14px;padding:14px 18px;cursor:pointer;
  transition:box-shadow 0.2s;
}
.cart-inner:hover{box-shadow:0 0 28px rgba(182,255,42,0.35)}
.cart-inner:active{transform:scale(0.98)}
.cart-left{display:flex;align-items:center;gap:10px}
.cart-count{
  background:#050505;color:var(--lime);
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;
}
.cart-label{font-size:14px;font-weight:700;color:#050505}
.cart-total{font-size:15px;font-weight:800;color:#050505}

/* ── ORDER SHEET ── */
#order-sheet{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:none;align-items:flex-end;
}
#order-sheet.open{display:flex}
.sheet{
  width:100%;background:var(--s1);
  border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);
  max-height:85vh;overflow-y:auto;
  animation:slideUp 0.3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:14px auto 0}
.sheet-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sheet-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700}
.sheet-close{background:var(--s3);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.sheet-close:hover{color:var(--white)}
.sheet-body{padding:16px 20px}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.ci-left{display:flex;align-items:center;gap:10px}
.ci-emoji{font-size:22px}
.ci-name{font-size:13px;font-weight:600}
.ci-price{font-size:12px;color:var(--muted)}
.ci-qty{display:flex;align-items:center;gap:6px}
.ci-qty button{width:26px;height:26px;background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--lime);cursor:pointer;font-size:13px;font-weight:700;font-family:'Manrope',sans-serif}
.ci-qty button:hover{background:var(--lime2)}
.ci-qty span{font-size:13px;font-weight:600;min-width:20px;text-align:center}
.note-wrap{margin-top:16px}
.note-label{font-size:12px;color:var(--muted);margin-bottom:8px}
.note-input{
  width:100%;background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;font-size:13px;
  color:var(--white);font-family:'Manrope',sans-serif;
  resize:none;outline:none;
}
.note-input:focus{border-color:rgba(182,255,42,0.3)}
.bill{margin-top:20px;background:var(--s2);border-radius:14px;padding:16px}
.bill-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:var(--muted)}
.bill-row.total{font-weight:700;font-size:15px;color:var(--white);border-top:1px solid var(--border);margin-top:8px;padding-top:12px}
.bill-row.total span:last-child{color:var(--lime)}
.place-order-btn{
  width:100%;margin-top:20px;background:var(--lime);color:#050505;
  border:none;border-radius:14px;padding:16px;
  font-size:15px;font-weight:800;cursor:pointer;font-family:'Manrope',sans-serif;
  transition:box-shadow 0.2s,transform 0.15s;
}
.place-order-btn:hover{box-shadow:0 0 24px rgba(182,255,42,0.4);transform:translateY(-1px)}
.place-order-btn:active{transform:scale(0.98)}
.place-order-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}

/* ── SUCCESS SCREEN ── */
#success-screen{
  position:fixed;inset:0;z-index:300;
  background:var(--bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;
}
#success-screen.show{display:flex}
.success-icon{font-size:64px;margin-bottom:24px;animation:bounceIn 0.5s ease}
@keyframes bounceIn{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.success-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;margin-bottom:10px}
.success-sub{color:var(--muted);font-size:15px;margin-bottom:8px}
.success-id{font-size:12px;color:var(--muted);margin-bottom:36px}
.success-id span{color:var(--lime);font-weight:600}
.back-btn{
  background:var(--s2);border:1px solid var(--border);border-radius:12px;
  padding:12px 28px;color:var(--white);font-size:14px;font-weight:600;
  cursor:pointer;font-family:'Manrope',sans-serif;transition:border-color .2s;
}
.back-btn:hover{border-color:rgba(255,255,255,0.2)}

/* ── TOAST ── */
#toast{
  position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:10px 18px;
  font-size:13px;font-weight:500;
  transition:transform 0.3s;z-index:400;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── OTP MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:900;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal-box{
  width:100%;max-width:380px;background:var(--s1);
  border:1px solid var(--border);border-radius:20px;
  padding:24px;position:relative;animation:popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.modal-close{
  position:absolute;top:16px;right:16px;background:var(--s3);border:none;color:var(--muted);
  width:28px;height:28px;border-radius:14px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{color:var(--white)}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.modal-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block}
.modal-input{
  width:100%;background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;font-size:14px;color:var(--white);
  outline:none;transition:border-color 0.2s;margin-bottom:14px;font-family:'Manrope',sans-serif;
}
.modal-input:focus{border-color:rgba(182,255,42,0.3)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="header">
  <div class="header-top">
    <a href="index.html" class="logo">Go <b>Dine</b></a>
    <div class="table-badge" id="table-display">TABLE —</div>
  </div>
  <div class="rest-info">
    <div class="rest-name" id="rest-name">Loading...</div>
    <div class="rest-meta" id="rest-meta">Dine In · Scan &amp; Order</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon"><i data-lucide="search" style="width:16px;height:16px"></i></span>
    <input class="search-input" id="search-input" type="text" placeholder="Search dishes..."/>
  </div>
</div>

<!-- CATEGORY PILLS -->
<div class="cats" id="cats"></div>

<!-- MENU CONTENT -->
<div class="content" id="content">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading menu...</p>
  </div>
</div>

<!-- CART BAR -->
<div id="cart-bar">
  <div class="cart-inner" onclick="openSheet()">
    <div class="cart-left">
      <div class="cart-count" id="cart-count">0</div>
      <div class="cart-label">View Order</div>
    </div>
    <div class="cart-total" id="cart-bar-total">₹0</div>
  </div>
</div>

<!-- ORDER SHEET -->
<div id="order-sheet" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">Your Order</span>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body">
      <div id="sheet-items"></div>
      <div class="note-wrap">
        <div class="note-label">Any special requests?</div>
        <textarea class="note-input" id="order-note" rows="2" placeholder="e.g. No onions, extra spicy..."></textarea>
      </div>
      <div class="bill" id="bill"></div>
      <button class="place-order-btn" id="place-btn" onclick="triggerCheckout()">Place Order →</button>
    </div>
  </div>
</div>

<!-- SUCCESS SCREEN -->
<div id="success-screen">
  <div class="success-icon">💳</div>
  <div class="success-title">Order Registered!</div>
  <div class="success-sub">Please proceed to the counter for payment.</div>
  <div class="success-id">Order ID: <span id="order-id">—</span></div>
  <button class="back-btn" onclick="resetOrder()">Order More</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- GUEST MODAL -->
<div id="guest-modal" class="modal-overlay" onclick="if(event.target===this)closeGuestModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeGuestModal()">✕</button>
    <div class="modal-title">Your Details</div>
    <div class="modal-sub">Let us know who you are to track your order.</div>
    
    <label class="modal-label">Your Name</label>
    <input type="text" id="guest-name" class="modal-input" placeholder="e.g. John Doe">

    <label class="modal-label">Phone Number</label>
    <input type="tel" id="guest-phone" class="modal-input" placeholder="e.g. 9876543210" onkeypress="if(event.key==='Enter')saveGuestAndOrder()">
    
    <button class="place-order-btn" id="save-guest-btn" onclick="saveGuestAndOrder()" style="margin-top:16px;">Save & Place Order →</button>
  </div>
</div>

<script>
/* ── INIT ── */
const { createClient } = supabase;
let sb;
try { sb = createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey); } catch(e){}

const params = new URLSearchParams(location.search);
const restaurantSlug = params.get('r') || 'demo';
const tableNum = params.get('table') || '1';
const isDemo = CONFIG.supabaseUrl === 'YOUR_SUPABASE_PROJECT_URL';

let restaurant = null;    // {id, name, slug, total_tables}
let allDishes = [];
let cart = {};             // id -> {dish, qty}
let activeCategory = 'All';

/* ── 12 DEMO DISHES ── */
const DEMO_RESTAURANT = { id: 'demo', name: 'The Rustic Fork', slug: 'demo', total_tables: 10 };
const DEMO_DISHES = [
  {id:'d1', name:'Pasta Arrabbiata',    description:'Spicy tomato penne, parmesan',       price:280, category:'Main Course', emoji:'🍝', available:true},
  {id:'d2', name:'Smash Burger',        description:'Double patty, secret sauce, fries',  price:320, category:'Main Course', emoji:'🍔', available:true},
  {id:'d3', name:'Margherita Pizza',    description:'Classic with fresh basil',           price:350, category:'Main Course', emoji:'🍕', available:true},
  {id:'d4', name:'Grilled Chicken',     description:'Herb-marinated, side salad',         price:380, category:'Main Course', emoji:'🍗', available:true},
  {id:'d5', name:'Caesar Salad',        description:'Romaine, croutons, parmesan',        price:220, category:'Starters',    emoji:'🥗', available:true},
  {id:'d6', name:'Garlic Bread',        description:'Toasted with herb butter',           price:120, category:'Starters',    emoji:'🥖', available:true},
  {id:'d7', name:'Veg Spring Rolls',    description:'Crispy, sweet chilli dip',           price:160, category:'Starters',    emoji:'🥟', available:true},
  {id:'d8', name:'Cold Coffee',         description:'Chilled espresso, milk, ice',        price:150, category:'Beverages',   emoji:'☕', available:true},
  {id:'d9', name:'Mango Lassi',         description:'Fresh mango, yogurt, chilled',       price:120, category:'Beverages',   emoji:'🥤', available:true},
  {id:'d10',name:'Fresh Lime Soda',     description:'Sweet or salt, chilled',              price:80, category:'Beverages',   emoji:'🍋', available:true},
  {id:'d11',name:'Chocolate Lava Cake', description:'Warm, vanilla ice cream',            price:220, category:'Desserts',    emoji:'🍫', available:true},
  {id:'d12',name:'Gulab Jamun',         description:'Classic, sugar syrup, warm',         price:140, category:'Desserts',    emoji:'🍮', available:true},
];

/* ── SETUP HEADER ── */
document.getElementById('table-display').textContent = 'TABLE ' + tableNum.toUpperCase();
document.getElementById('search-input').addEventListener('input', e => renderMenu(e.target.value));

/* ── BOOT ── */
async function boot() {
  const savedGuest = localStorage.getItem('godine_guest');
  if (savedGuest) {
    try { window.currentUser = JSON.parse(savedGuest); } catch(e){}
  }

  if (isDemo) {
    restaurant = DEMO_RESTAURANT;
    allDishes = DEMO_DISHES;
    applyRestaurant();
    renderCategories();
    renderMenu();
    return;
  }

  // Fetch restaurant by slug
  try {
    const { data: restData, error: restErr } = await sb
      .from('restaurants').select('*').eq('slug', restaurantSlug).single();
      
    if (restErr || !restData) {
      showError('Restaurant not found', `No restaurant with slug "${restaurantSlug}" exists.`);
      return;
    }
    
    // GUARD: Check if restaurant is active
    if (restData.is_active === false) {
      document.body.innerHTML = `
        <div style="display:grid;place-items:center;height:100vh;font-family:sans-serif;text-align:center;color:#fff;">
          <div>
            <div style="font-size:3rem">🚫</div>
            <h2>${restData.name}</h2>
            <p style="color:#888;margin-top:10px;">This restaurant is currently closed. Please check back later.</p>
          </div>
        </div>`;
      return;
    }
    
    restaurant = restData;
    applyRestaurant();

    // Fetch dishes for this restaurant
    const { data: dishData, error: dishErr } = await sb
      .from('dishes').select('*')
      .eq('restaurant_id', restaurant.id)
      .order('category').order('name');
    allDishes = dishErr ? [] : (dishData || []);
  } catch(e) {
    restaurant = DEMO_RESTAURANT;
    allDishes = DEMO_DISHES;
    applyRestaurant();
  }

  renderCategories();
  renderMenu();
  lucide.createIcons();
}

function applyRestaurant() {
  document.getElementById('rest-name').textContent = restaurant.name;
  document.getElementById('rest-meta').textContent = 'Table ' + tableNum + ' · Dine In · Scan & Order';
  // Descriptive SEO Title
  document.title = `${restaurant.name} | View Menu & Order Online — Go Dine`;
}

function showError(title, msg) {
  document.getElementById('header').style.display = 'none';
  document.getElementById('cats').style.display = 'none';
  document.getElementById('content').innerHTML = `
    <div class="error-screen">
      <div class="e-icon">🚫</div>
      <h2>${title}</h2>
      <p>${msg}</p>
      <a href="index.html">← Back to Go Dine</a>
    </div>`;
}

/* ── CATEGORIES ── */
function getCategories() {
  return ['All', ...new Set(allDishes.map(d => d.category))];
}

function renderCategories() {
  const cats = getCategories();
  const el = document.getElementById('cats');
  el.innerHTML = cats.map(c =>
    `<button class="cat-btn${c === activeCategory ? ' active' : ''}" onclick="filterCat('${c}')">${c}</button>`
  ).join('');
}

function filterCat(cat) {
  activeCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
  renderMenu();
}

/* ── RENDER MENU ── */
function renderMenu(search = '') {
  const q = search.toLowerCase();
  const filtered = allDishes.filter(d => {
    const matchCat = activeCategory === 'All' || d.category === activeCategory;
    const matchSearch = !q || d.name.toLowerCase().includes(q) || (d.description || '').toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  const el = document.getElementById('content');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="e-icon"><i data-lucide="search-x" style="width:40px;height:40px"></i></div><p>No dishes found</p></div>`;
    return;
  }

  if (activeCategory === 'All' && !q) {
    const groups = {};
    filtered.forEach(d => { (groups[d.category] = groups[d.category] || []).push(d); });
    el.innerHTML = Object.entries(groups).map(([cat, dishes]) =>
      `<div class="section-head">${cat}</div>` + dishes.map(dishCard).join('')
    ).join('');
  } else {
    el.innerHTML = filtered.map(dishCard).join('');
  }
}

function dishCard(d) {
  const qty = cart[d.id]?.qty || 0;
  const ctrl = qty > 0
    ? `<div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${d.id}',-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${d.id}',1)">+</button>
       </div>`
    : d.available
      ? `<button class="add-btn" onclick="addItem('${d.id}')">+ Add</button>`
      : `<span class="unavail-tag">Unavailable</span>`;

  return `<div class="dish-card${!d.available ? ' unavailable' : ''}" id="card-${d.id}">
    <div class="dish-emoji">${d.emoji || '🍽️'}</div>
    <div class="dish-body">
      <div class="dish-name">${d.name}</div>
      <div class="dish-desc">${d.description || ''}</div>
      <div class="dish-bottom">
        <div class="dish-price">₹${d.price}</div>
        ${ctrl}
      </div>
    </div>
  </div>`;
}

/* ── CART ── */
function addItem(id) {
  const dish = allDishes.find(d => d.id === id);
  if (!dish) return;
  cart[id] = { dish, qty: 1 };
  refreshCard(id);
  updateCartBar();
  showToast(`${dish.emoji} ${dish.name} added`);
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  refreshCard(id);
  updateCartBar();
  if (document.getElementById('order-sheet').classList.contains('open')) renderSheet();
}

function refreshCard(id) {
  const d = allDishes.find(x => x.id === id);
  const el = document.getElementById('card-' + id);
  if (!el || !d) return;
  const qty = cart[id]?.qty || 0;
  const ctrl = qty > 0
    ? `<div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${id}',-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${id}',1)">+</button>
       </div>`
    : `<button class="add-btn" onclick="addItem('${id}')">+ Add</button>`;
  el.querySelector('.dish-bottom').innerHTML = `<div class="dish-price">₹${d.price}</div>${ctrl}`;
}

function updateCartBar() {
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.dish.price * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-bar-total').textContent = '₹' + total;
  document.getElementById('cart-bar').classList.toggle('visible', count > 0);
  localStorage.setItem('godine_cart', JSON.stringify(cart));
}

/* ── ORDER SHEET ── */
function openSheet() {
  renderSheet();
  document.getElementById('order-sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('order-sheet').classList.remove('open');
}

function renderSheet() {
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.dish.price * i.qty, 0);

  document.getElementById('sheet-items').innerHTML = items.map(({dish, qty}) =>
    `<div class="cart-item">
      <div class="ci-left">
        <span class="ci-emoji">${dish.emoji}</span>
        <div>
          <div class="ci-name">${dish.name}</div>
          <div class="ci-price">₹${dish.price} × ${qty}</div>
        </div>
      </div>
      <div class="ci-qty">
        <button onclick="changeQty('${dish.id}',-1)">−</button>
        <span>${qty}</span>
        <button onclick="changeQty('${dish.id}',1)">+</button>
      </div>
    </div>`
  ).join('');

  document.getElementById('bill').innerHTML = `
    <div class="bill-row total"><span>Total</span><span>₹${total}</span></div>
  `;
}

/* ── CHECKOUT & CUSTOMER DETAILS ── */
async function triggerCheckout() {
  const items = Object.values(cart);
  if (!items.length) { showToast('⚠️ Cart is empty'); return; }

  if (isDemo) {
    actualPlaceOrder('Demo User', '+910000000000');
    return;
  }

  if (!window.currentUser || !window.currentUser.phone || !window.currentUser.name) {
    document.getElementById('guest-modal').classList.add('open');
    return;
  }

  actualPlaceOrder(window.currentUser.name, window.currentUser.phone);
}

function closeGuestModal() { document.getElementById('guest-modal').classList.remove('open'); }

async function saveGuestAndOrder() {
  let name = document.getElementById('guest-name').value.trim();
  let phone = document.getElementById('guest-phone').value.trim();
  
  if (!name) { showToast('⚠️ Enter your name'); return; }
  if (!phone) { showToast('⚠️ Enter phone number'); return; }
  
  phone = phone.replace(/[\s\-\(\)]/g, '');
  if (!phone.startsWith('+')) phone = '+91' + phone;

  const btn = document.getElementById('save-guest-btn');
  btn.disabled = true; btn.textContent = 'Saving...';

  window.currentUser = { name, phone };
  localStorage.setItem('godine_guest', JSON.stringify(window.currentUser));
  
  closeGuestModal();
  btn.disabled = false; btn.textContent = 'Save & Place Order →';
  
  actualPlaceOrder(name, phone);
}

async function actualPlaceOrder(name, phone) {
  const items = Object.values(cart);
  if (!items.length) return;
  const btn = document.getElementById('place-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Placing order...'; }

  const total = items.reduce((s, i) => s + i.dish.price * i.qty, 0);
  const token = Math.floor(Math.random() * 90 + 10).toString(); // 2-digit token (10-99)
  
  const originalNote = document.getElementById('order-note').value.trim();
  const orderItems = items.map(({dish, qty}) => ({id: dish.id, name: dish.name, emoji: dish.emoji, price: dish.price, qty}));

  if (isDemo) {
    setTimeout(() => {
      localStorage.removeItem('godine_cart');
      window.location.href = `customer.html?r=${restaurantSlug}`;
    }, 1000);
    return;
  }

  try {
    const { error } = await sb.from('orders').insert({
      restaurant_id: restaurant.id,
      table_number: tableNum,
      customer_name: name,
      customer_phone: phone,
      customer_uid: null,
      items: orderItems,
      total,
      note: originalNote,
      token_number: token,
      status: 'pending'
    });

    if (error) throw error;
    localStorage.removeItem('godine_cart');
    window.location.href = `customer.html?r=${restaurantSlug}`;
  } catch(e) {
    console.error(e);
    if (btn) { btn.disabled = false; btn.textContent = 'Place Order →'; }
    
    let msg = '⚠️ Failed to place order. Try again.';
    if (e.message && e.message.includes('column "token_number" of relation "orders" does not exist')) {
        msg = 'Database Setup Incomplete: The "token_number" column is missing in the orders table.';
    }
    showToast(msg);
  }
}

function resetOrder() {
  cart = {};
  updateCartBar();
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('place-btn').disabled = false;
  document.getElementById('place-btn').textContent = 'Place Order →';
  document.getElementById('order-note').value = '';
  renderMenu();
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ── BOOT ── */
boot();
</script>
</body>
</html>
